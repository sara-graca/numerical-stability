stages:
  parse:
    cmd: python src/parse_corpus.py
    deps:
      - src/parse_corpus.py
      - ${corpus.dir}
      - ${corpus.metadata}
    params:
      - corpus
      - parse
    outs:
      - data/parsed/words.csv
      - data/parsed/usable_words.json

  extract:
    cmd: python src/extract_embeddings.py
    deps:
      - src/extract_embeddings.py
      - data/parsed/words.csv
      - data/parsed/usable_words.json
    params:
      - extract
    outs:
      - data/features/word_embeddings.parquet

  distances:
    cmd: python src/compute_distances.py
    deps:
      - src/compute_distances.py
      - data/features/word_embeddings.parquet
    params:
      - distances
    outs:
      - data/distances/distances.parquet
      - data/distances/precision_stats.csv

  visualise:
    cmd: python src/visualise.py
    deps:
      - src/visualise.py
      - data/distances/distances.parquet
      - data/distances/precision_stats.csv
    params:
      - distances
    outs:
      - data/figures/kde_distances_by_precision.png
      - data/figures/mean_distances_by_precision.png
      - data/figures/deviation_from_float64.png
